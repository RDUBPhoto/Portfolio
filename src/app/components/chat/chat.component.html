<section
  class="chat-shell"
  [class.chat-shell-hero]="mode === 'hero'"
  [class.chat-shell-dock]="mode === 'dock'"
  [class.chat-shell-widget]="mode === 'widget'"
>
  <header class="chat-header">
    <h2>Ask my portfolio AI</h2>
  </header>

  <ng-container *ngIf="mode === 'hero'; else dockLayout">
    <div #chatBody class="chat-body hero-chat-body" [class.has-messages]="messages.length > 0">
      <article
        *ngFor="let message of messages"
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
      >
        <span>{{ message.content }}</span>
        <button
          *ngIf="message.role === 'assistant' && message.action"
          type="button"
          class="message-action-link"
          (click)="runMessageAction(message)"
        >
          {{ message.action.label }}
        </button>
      </article>

      <article *ngIf="loading" class="message assistant typing">
        <span></span><span></span><span></span>
      </article>
    </div>

    <form class="prompt-wrap" (submit)="sendMessage(); $event.preventDefault()">
      <input
        type="text"
        [(ngModel)]="userInput"
        name="prompt"
        placeholder="Ask something like ‘Show me your healthcare UX case studies.’"
        (keyup.enter)="sendMessage()"
        [disabled]="loading"
        aria-label="Ask portfolio assistant"
      />
      <button type="submit" [disabled]="loading || !userInput.trim()">Ask</button>
    </form>

    <div class="suggestions suggestions-stack">
      <button
        *ngFor="let prompt of suggestedPrompts"
        (click)="usePrompt(prompt)"
        [disabled]="loading"
        type="button"
      >
        {{ prompt }}
      </button>
    </div>
  </ng-container>

  <ng-template #dockLayout>
    <div #chatBody class="chat-body" [class.has-messages]="messages.length > 0">
      <article
        *ngFor="let message of messages"
        class="message"
        [class.user]="message.role === 'user'"
        [class.assistant]="message.role === 'assistant'"
      >
        <span>{{ message.content }}</span>
        <button
          *ngIf="message.role === 'assistant' && message.action"
          type="button"
          class="message-action-link"
          (click)="runMessageAction(message)"
        >
          {{ message.action.label }}
        </button>
      </article>

      <article *ngIf="loading" class="message assistant typing">
        <span></span><span></span><span></span>
      </article>
    </div>

    <div class="suggestions suggestions-dock">
      <button
        *ngFor="let prompt of suggestedPrompts"
        (click)="usePrompt(prompt)"
        [disabled]="loading"
        type="button"
      >
        {{ prompt }}
      </button>
    </div>

    <form class="prompt-wrap prompt-wrap-dock" (submit)="sendMessage(); $event.preventDefault()">
      <input
        type="text"
        [(ngModel)]="userInput"
        name="promptDock"
        placeholder="Ask a follow-up question..."
        (keyup.enter)="sendMessage()"
        [disabled]="loading"
        aria-label="Ask portfolio assistant"
      />
      <button type="submit" [disabled]="loading || !userInput.trim()">Ask</button>
    </form>
  </ng-template>
</section>
