<div class="container py-4 projects-page">
  <a routerLink="/" class="back-home" aria-label="Back to home">
    <span class="arrow">←</span>
    <span>Home</span>
  </a>

  <h2 class="fw-bold mb-4">My Projects</h2>

  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let project of projects">
      <a [routerLink]="['/projects', project.slug]" class="text-decoration-none">
        <div class="card h-100 shadow-sm">
          <img [src]="project.images[0]" class="card-img-top" [alt]="project.title">
          <div class="card-body">
            <h5 class="card-title">{{ project.title }}</h5>
            <p class="card-text text-muted small">{{ project.category }}</p>
          </div>
        </div>
      </a>
    </div>
  </div>
</div>
